spring.application.name=demoTest

# Database Configuration - MySQL (Production)
# Uncomment the following lines to use MySQL
 spring.datasource.url=jdbc:mysql://localhost:3306/order_management
 spring.datasource.username=root
 spring.datasource.password=root
 spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Database Configuration - H2 (Development/Testing)
#spring.datasource.url=jdbc:h2:mem:order_management
#spring.datasource.username=sa
#spring.datasource.password=
#spring.datasource.driver-class-name=org.h2.Driver
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.payable.demotest=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Security - JWT Configuration
jwt.secret=9a6142371948332d725656322d725656322d725656322d725656322d72565632
jwt.expiration=86400000

# GitHub API Configuration
github.token=${GITHUB_TOKEN}

# MCP Server Configuration
spring.ai.mcp.server.name=demo-github-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.sse-message-endpoint=/mcp/messages

